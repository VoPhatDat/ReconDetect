rules:

  # ========================
  # 🔥 MASSIVE RECON & HOST DISCOVERY
  # ========================
  - id: R200
    name: Massive Host Discovery
    confidence: CONFIRMED
    conditions:
      dst_ip_count: { gt: 100 }

  - id: R201
    name: Wide Network Scan (Fast)
    confidence: CONFIRMED
    conditions:
      dst_ip_count: { gt: 50 }
      duration:     { lt: 30 }

  # ========================
  # ⚡ SPEED DETECTION (đã siết chặt để giảm false positive)
  # ========================
  - id: R210
    name: Ultra Fast Scan (Masscan/ZMap)
    confidence: CONFIRMED
    conditions:
      pkt_per_sec:  { gt: 100 }
      dst_ip_count: { gt: 10 }          # phải quét nhiều IP

  - id: R211
    name: High Speed Scan (Nmap -T4/-T5)
    confidence: CONFIRMED
    conditions:
      pkt_per_sec:  { gt: 50 }
      duration:     { lt: 10 }
      port_count:   { gt: 20 }          # phải quét nhiều port

  - id: R212
    name: Medium Speed Scan
    confidence: SUSPECTED
    conditions:
      pkt_per_sec:  { gt: 20 }
      port_count:   { gt: 30 }
      port_entropy: { gt: 4 }

  - id: R213
    name: Burst Scan
    confidence: CONFIRMED
    conditions:
      pkt_per_sec:  { gt: 80 }
      duration:     { lt: 5 }
      dst_ip_count: { gt: 5 }

  # ========================
  # Các rule còn lại giữ nguyên (ICMP, ARP, Stealth, Entropy, Combo...)
  # (mình chỉ rút gọn phần tốc độ, phần còn lại bạn giữ nguyên như bộ trước)
  # ========================
  - id: R220
    name: ICMP Sweep Aggressive
    confidence: CONFIRMED
    conditions:
      icmp_echo:    { gt: 30 }
      dst_ip_count: { gt: 20 }

  - id: R230
    name: ARP Massive Sweep
    confidence: CONFIRMED
    conditions:
      arp_request:  { gt: 50 }
      dst_ip_count: { gt: 50 }

  - id: R240
    name: Full Port Scan
    confidence: CONFIRMED
    conditions:
      port_count: { gt: 1000 }

  - id: R250
    name: SYN Scan (Nmap -sS)
    confidence: CONFIRMED
    conditions:
      syn_count:    { gt: 30 }
      ack_ratio:    { lt: 0.3 }
      port_entropy: { gt: 3 }

  - id: R270
    name: NULL Scan
    confidence: CONFIRMED
    conditions:
      null_count: { gt: 5 }

  - id: R271
    name: XMAS Scan
    confidence: CONFIRMED
    conditions:
      xmas_count: { gt: 5 }

  - id: R272
    name: FIN Scan
    confidence: CONFIRMED
    conditions:
      fin_count: { gt: 5 }

  - id: R280
    name: High Entropy Port Scan (tool tự động)
    confidence: CONFIRMED
    conditions:
      port_entropy: { gt: 6 }
      port_count:   { gt: 30 }

  # Combo
  - id: R290
    name: Recon Chain (Sweep + Port Scan)
    confidence: CONFIRMED
    conditions:
      dst_ip_count: { gt: 15 }
      port_count:   { gt: 30 }